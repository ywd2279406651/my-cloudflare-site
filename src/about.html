<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于站点</title>
  <link rel="stylesheet" href="./assets/styles/main.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      --bg-mask: rgba(15, 18, 35, 0.38);
      --card-bg: rgba(32, 36, 58, 0.38);
      --card-border: rgba(255, 255, 255, 0.10);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.78);
      --text-muted: rgba(255, 255, 255, 0.58);
      --accent-color: #7c3aed;
      --item-hover-bg: rgba(255, 255, 255, 0.08);
      --stat-bg: rgba(255, 255, 255, 0.06);
      --title-color: #f5e6b3;
      --divider-color: rgba(245, 230, 179, 0.25);
      --nav-text: #ffffff;
    }
    .light-theme {
      --bg-mask: rgba(240, 245, 255, 0.35);
      --card-bg: rgba(255, 255, 255, 0.62);
      --card-border: rgba(0, 0, 0, 0.06);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --accent-color: #6d28d9;
      --item-hover-bg: rgba(109, 40, 217, 0.08);
      --stat-bg: rgba(255, 255, 255, 0.55);
      --title-color: #6d28d9;
      --divider-color: rgba(109, 40, 217, 0.2);
      --nav-text: #1e293b;
    }
    html, body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      color: var(--text-primary);
    }
    body {
      background: url('https://picsum.photos/id/1043/1920/1080') center/cover no-repeat fixed;
      position: relative;
    }
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--bg-mask);
      z-index: -1;
    }
    .navbar {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--card-border);
    }
    .light-theme .nav-logo, .light-theme .nav-links a {color: var(--nav-text);}
    .light-theme .nav-links a.active {color: var(--accent-color);}
    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      width:36px;height:36px;border-radius:10px;cursor:pointer;
    }
    .main-wrap {max-width:1000px;margin:0 auto;padding:30px 20px;}
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border:1px solid var(--card-border);
      border-radius:18px;padding:32px;box-shadow:var(--card-shadow);
    }
    .page-title {font-size:2.2rem;text-align:center;color:var(--title-color);margin-bottom:10px;}
    .page-desc {text-align:center;color:var(--text-secondary);margin-bottom:36px;padding-bottom:20px;border-bottom:1px dashed var(--divider-color);}
    .section-title {font-size:1.25rem;color:var(--title-color);margin:28px 0 12px;display:flex;gap:8px;align-items:center;}
    .section-content {color:var(--text-secondary);line-height:1.8;}
    .tech-list {display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
    .tech-tag {padding:6px 16px;border-radius:20px;background:var(--accent-color);color:#fff;font-size:0.85rem;}
    .back-btn {display:block;margin:0 auto;padding:12px 30px;background:var(--stat-bg);border:1px solid var(--card-border);border-radius:12px;text-decoration:none;color:var(--text-primary);text-align:center;}
  </style>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="./assets/zhuyetu/LOOP.mp4">
  </video>
  <header class="navbar">
    <div class="nav-container">
      <div class="nav-logo">⚡ CF Site</div>
      <nav class="nav-links">
        <a href="/index.html">首页</a>
        <a href="/about.html" class="active">关于</a>
        <a href="/links.html">链接收藏</a>
        <a href="/gallery.html">图库</a>
        <a href="/subscribe.html">订阅工具</a>
        <a href="/api/hello">API 测试</a>
      </nav>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
  </header>
  <main class="main-wrap">
    <div class="glass-card">
      <h1 class="page-title">ℹ️ 关于本站</h1>
      <div class="page-desc">站点架构与功能说明</div>
      <div class="section-title">📌 项目简介</div>
      <div class="section-content">
      基于 Vite 构建，部署在 Cloudflare Pages 全球边缘网络，纯静态无服务器架构，一键推送自动部署。全站玻璃拟态UI，支持明暗主题切换。
      </div>
      <div class="section-title">🛠️ 技术栈</div>
      <div class="section-content">
        <div class="tech-list">
          <span class="tech-tag">HTML5</span>
          <span class="tech-tag">CSS3</span>
          <span class="tech-tag">JS</span>
          <span class="tech-tag">Vite</span>
          <span class="tech-tag">Cloudflare Pages</span>
        </div>
      </div>
      <div class="section-title">📁 功能模块</div>
      <div class="section-content">
        <ul>
          <li>链接收藏：网址分类导航</li>
          <li>图片图库：响应式图集</li>
          <li>订阅面板（带密码验证）</li>
