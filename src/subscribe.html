<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订阅工具</title>
  <meta name="description" content="节点订阅工具导航">
  <link rel="stylesheet" href="./assets/styles/main.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    /* ========== 主题变量（与全站完全一致） ========== */
    :root {
      --bg-mask: rgba(15, 18, 35, 0.38);
      --card-bg: rgba(32, 36, 58, 0.38);
      --card-border: rgba(255, 255, 255, 0.10);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.78);
      --text-muted: rgba(255, 255, 255, 0.58);
      --accent-color: #7c3aed;
      --item-hover-bg: rgba(255, 255, 255, 0.08);
      --stat-bg: rgba(255, 255, 255, 0.06);
      --title-color: #f5e6b3;
      --divider-color: rgba(245, 230, 179, 0.25);
      --nav-text: #ffffff;
    }

    .light-theme {
      --bg-mask: rgba(240, 245, 255, 0.35);
      --card-bg: rgba(255, 255, 255, 0.62);
      --card-border: rgba(0, 0, 0, 0.06);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --accent-color: #6d28d9;
      --item-hover-bg: rgba(109, 40, 217, 0.08);
      --stat-bg: rgba(255, 255, 255, 0.55);
      --title-color: #6d28d9;
      --divider-color: rgba(109, 40, 217, 0.2);
      --nav-text: #1e293b;
    }

    /* 全局基础 */
    html, body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      color: var(--text-primary);
      transition: color 0.3s ease;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      position: relative;
      background: url('https://picsum.photos/id/1043/1920/1080') center/cover no-repeat fixed;
    }

    /* 背景视频 */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      pointer-events: none;
      filter: blur(0px) saturate(1.2);
      -webkit-filter: blur(0px) saturate(1.2);
      transform: scale(1.02);
    }

    /* 背景遮罩 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--bg-mask);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      z-index: -1;
      transition: background 0.3s ease;
    }

    /* 主题切换按钮 */
    .theme-toggle {
      background: var(--card-bg) !important;
      border: 1px solid var(--card-border) !important;
      color: var(--text-primary) !important;
      width: 36px !important;
      height: 36px !important;
      border-radius: 10px !important;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      font-size: 1rem !important;
      transition: all 0.3s ease !important;
      margin-left: 16px !important;
      flex-shrink: 0 !important;
      padding: 0 !important;
    }
    .theme-toggle:hover {
      transform: scale(1.08);
      border-color: var(--accent-color) !important;
    }

    /* 导航栏适配 */
    .navbar {
      background: var(--card-bg) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
      border-bottom: 1px solid var(--card-border) !important;
    }
    .light-theme .nav-logo,
    .light-theme .nav-links a {
      color: var(--nav-text) !important;
    }
    .light-theme .nav-links a.active {
      color: var(--accent-color) !important;
    }

    /* 主容器宽度 */
    .main-wrap {
      max-width: 1280px !important;
      width: 100% !important;
      margin: 0 auto !important;
      padding: 30px 20px !important;
    }

    /* 通用毛玻璃卡片 */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px) saturate(130%);
      -webkit-backdrop-filter: blur(12px) saturate(130%);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: var(--card-shadow);
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    /* 页面标题 */
    .page-title {
      font-size: 2.2rem;
      font-weight: 600;
      text-align: center;
      color: var(--title-color);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .page-desc {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 36px;
      font-size: 1.05rem;
      padding-bottom: 20px;
      border-bottom: 1px dashed var(--divider-color);
    }

    /* 订阅卡片网格 */
    .subscribe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 30px;
    }
    .subscribe-card {
      background: var(--stat-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 28px 24px;
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .subscribe-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-color);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--divider-color);
    }
    .card-icon {
      font-size: 1.8rem;
    }
    .card-name {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--title-color);
    }

    .card-desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 20px;
      flex: 1;
    }

    .card-link {
      display: block;
      width: 100%;
      padding: 12px 20px;
      text-align: center;
      background: var(--accent-color);
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.25s ease;
    }
    .card-link:hover {
      filter: brightness(1.15);
      transform: translateY(-2px);
    }

    /* 返回按钮 */
    .back-btn {
      display: block;
      width: fit-content;
      margin: 0 auto;
      padding: 12px 30px;
      background: var(--stat-bg);
      backdrop-filter: blur(8px);
      color: var(--text-primary);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.25s ease;
    }
    .back-btn:hover {
      background: var(--item-hover-bg);
      border-color: var(--accent-color);
      transform: translateY(-2px);
    }

    /* 密码弹窗样式 */
    .password-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      width: 90%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal-title {
      font-size: 1.5rem;
      color: var(--title-color);
      text-align: center;
      margin-bottom: 20px;
    }
    .pwd-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: var(--stat-bg);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    .pwd-input:focus {
      border-color: var(--accent-color);
    }
    .modal-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: var(--accent-color);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .modal-btn:hover {
      filter: brightness(1.1);
    }
    .tip-text {
      text-align: center;
      margin-top:12px;
      font-size:0.85rem;
      color:#ff7777;
      display:none;
    }
    .content-wrap {
      display: none;
    }

    /* 响应式 */
    @media (max-width: 650px) {
      .page-title { font-size: 1.8rem; }
      .subscribe-grid { gap: 16px; }
    }
  </style>
</head>
<body>
  <!-- 密码弹窗 -->
  <div class="password-modal" id="pwdModal">
    <div class="modal-box">
      <h2 class="modal-title">🔒 访问验证</h2>
      <input class="pwd-input" id="pwdInput" type="password" placeholder="请输入访问密码" autocomplete="off">
      <button class="modal-btn" id="confirmBtn">确认解锁</button>
      <div class="tip-text" id="errTip">密码错误，请重新输入</div>
    </div>
  </div>

  <!-- 页面主体内容（默认隐藏，密码正确才显示） -->
  <div class="content-wrap" id="pageContent">
    <!-- 背景视频 -->
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="./assets/zhuyetu/LOOP.mp4" type="video/mp4">
    </video>

    <!-- 顶部导航 -->
    <header class="navbar">
      <div class="nav-container">
        <div class="nav-logo">⚡ CF Site</div>
        <nav class="nav-links">
          <a href="/index.html">首页</a>
          <a href="/about.html">关于</a>
          <a href="/links.html">链接收藏</a>
          <a href="/gallery.html">图库</a>
          <a href="/subscribe.html" class="active">订阅工具</a>
          <a href="/api/hello">API 测试</a>
        </nav>
        <button class="theme-toggle" id="themeToggle" title="切换明暗主题">🌙</button>
      </div>
    </header>

    <!-- 主内容 -->
    <main class="main-wrap">
      <div class="glass-card">
        <h1 class="page-title">📡 订阅工具导航</h1>
        <div class="page-desc">✦ 节点订阅管理工具 + 客户端下载合集 ✦</div>
        <!-- 卡片容器：JS动态渲染，源码里看不到链接 -->
        <div class="subscribe-grid" id="subscribeGrid"></div>
        <a href="/index.html" class="back-btn">← 返回首页</a>
      </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
      <p>© 2025 My Cloudflare Site · Built with Vite & Cloudflare Pages</p>
    </footer>
  </div>

  <script type="module" src="./js/main.js"></script>
  <script>
    // ========== 加密配置区（F12看不到明文密码和链接） ==========
    // 密码SHA256哈希：默认密码123456对应的哈希，自行替换
    const PASSWORD_HASH = "4e350f267cd76d000e9d0f99691683ebd989182a1b8266c02bc3739ef2fa1211";
    // 订阅链接Base64加密字符串
    const ENCRYPTED_LINKS = "W3siaWNvbiI6IvCfkYaIsIm5hbWUiOiLorr76ZueiKeS4quS5iOermCIsImRlc2MiOiLlpKflrqDlrqjnqIsp5a6X5oyB5Lu96YOo44CB6L6T6IO95LyY6YCJ5omL5paw5paw77yM5pS/5oyB6Ieq5a6a5LiA5Yy65LiN5Yy65Y+q5Liq5Y2X6K6+IiwidXJsIjoiaHR0cHM6Ly9iaWFuaGFpeWFuLmRwZG5zLm9yZyJ9LHsiaWNvbiI6IvCfkKiIsIm5hbWUiOiJWTEVTUyDojIznrKTor73ovazorr76ZueiKeS6pSIsImRlc2MiOiJDbG91ZGZsYXJlIFdvcmtlcnMg6IqC54K56K6+6ZiL5a6a6K6+6L6R5oiQ5a6e5a6X5oiQ6L6R5LiL6aG15Y+q5pawIiwidXJsIjoiaHR0cHM6Ly9rZWJpcWlhb2VuLmRwZG5zLm9yZy80NzE1ZTI1OC04ZmE3LTQwMzctYjJmOC1kNzUzY2JmZDk5ZjMifSx7Imljb24iOiLwnp2377iPIiwibmFtZSI6IlBhZ2VzIOeUqOeUqOWQgOWQjiIsImRlc2MiOiLnq5lkZWdldHVubmVsIOmDriveYvhjnmoTorr76ZueiKeeUqOeUqOWQgOWQjiw5pS/5a6X6IqC54K56YeR5L2c5Li66KeE5YiZ566h55CGIiwidXJsIjoiaHR0cHM6Ly9iaWFuaGFpeWFuLnBhZ2VzLmRldi9hZG1pbiJ9LHsiaWNvbiI6IvCfk6EiLCJuYW1lIjoiQ2xhc2hNZXRhRm9yQW5kcm9pZCIsImRlc2MiOiLlraDljJfmiYvmnLrnrqHnlLXnqIvlvqgsQ2xhc2ggTWV0YeWGheGcq++8jOaUv+WFjeS4quWGs+S6uuS9nOWbiuWbvuW6k+WFiue6p+S4quS6pSIsInVybCI6Imh0dHBzOi8vZ2l0aHViLmNvbS9NZXRhQ3ViZVgvQ2xhc2hNZXRhRm9yQW5kcm9pZC9yZWxlYXNlcy90YWcvdjIuMTEuMzAifSx7Imljb24iOiLwnp23IiwibmFtZSI6InYycmF5TiBXaW5kb3dzIiwiZGVzYyI6IldpbmRvd3PnoJTpob/vvIzmlb/nrKbWTEVTUy9WbWVzcy9Ucm9qYW7nur/nmoTljov6K6w5LiL6aG15Y+q5pawIiwidXJsIjoiaHR0cHM6Ly9naXRodWIuY29tLzJkdXN0L3YycmF5Ti9yZWxlYXNlcy9kb3dubG9hZC83LjIzLjEvdjJyYXlOLXdpbmRvd3MtNjQuemlwIn1d";
    const STORAGE_KEY = "subscribe_auth";
    const VALID_MINUTE = 10; // 验证有效期10分钟

    const pwdModal = document.getElementById('pwdModal');
    const pageContent = document.getElementById('pageContent');
    const pwdInput = document.getElementById('pwdInput');
    const confirmBtn = document.getElementById('confirmBtn');
    const errTip = document.getElementById('errTip');
    const subscribeGrid = document.getElementById('subscribeGrid');

    // 浏览器原生SHA256计算
    async function sha256(message) {
      const encoder = new TextEncoder();
      const data = encoder.encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 渲染订阅卡片
    function renderCards(linkData) {
      subscribeGrid.innerHTML = linkData.map(item => `
        <div class="subscribe-card">
          <div class="card-header">
            <span class="card-icon">${item.icon}</span>
            <div class="card-name">${item.name}</div>
          </div>
          <p class="card-desc">${item.desc}</p>
          <a href="${item.url}" target="_blank" class="card-link">${item.btnText || '前往查看'}</a>
        </div>
      `).join('');
    }

    // 校验本地存储是否已授权
    function checkAuth() {
      const authStr = localStorage.getItem(STORAGE_KEY);
      if (!authStr) return false;
      const authData = JSON.parse(authStr);
      const now = Date.now();
      const expire = authData.time + VALID_MINUTE * 60 * 1000;
      return now < expire;
    }

    // 解锁页面
    function unlockPage() {
      // 解密链接数据
      const linkData = JSON.parse(atob(ENCRYPTED_LINKS));
      renderCards(linkData);
      pwdModal.style.display = "none";
      pageContent.style.display = "block";
    }

    // 验证密码
    async function verifyPwd() {
      errTip.style.display = "none";
      const inputVal = pwdInput.value.trim();
      if (!inputVal) return;
      
      const inputHash = await sha256(inputVal);
      if (inputHash === PASSWORD_HASH) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ time: Date.now() }));
        unlockPage();
      } else {
        errTip.style.display = "block";
        pwdInput.value = "";
        pwdInput.focus();
      }
    }

    // 页面加载判断权限
    window.addEventListener('DOMContentLoaded', () => {
      // 主题切换逻辑
      const themeToggle = document.getElementById('themeToggle');
      const htmlEl = document.documentElement;
      const savedTheme = localStorage.getItem('site-theme');
      if (savedTheme === 'light') {
        htmlEl.classList.add('light-theme');
        themeToggle.textContent = '☀️';
      } else {
        themeToggle.textContent = '🌙';
      }
      themeToggle.addEventListener('click', () => {
        htmlEl.classList.toggle('light-theme');
        const isLight = htmlEl.classList.contains('light-theme');
        themeToggle.textContent = isLight ? '☀️' : '🌙';
        localStorage.setItem('site-theme', isLight ? 'light' : 'dark');
      });

      // 密码验证逻辑
      if (checkAuth()) {
        unlockPage();
      }
      confirmBtn.addEventListener('click', verifyPwd);
      pwdInput.addEventListener('keydown', (e) => {
        if (e.key === "Enter") verifyPwd();
      })
    })
  </script>
</body>
</html>
