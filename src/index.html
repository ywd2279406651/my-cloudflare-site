<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloudflare Vite 静态站点</title>
  <meta name="description" content="基于 Vite 构建 + Cloudflare Pages 托管的无服务器站点方案">
  <link rel="stylesheet" href="./assets/styles/main.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    /* 新增：最近使用区域样式 */
    .recent-section {
      margin-top: 60px;
    }

    .recent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 30px;
    }

    .recent-card {
      background-color: rgba(10, 15, 30, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .recent-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255, 215, 100, 0.4);
      box-shadow: 0 28px 50px rgba(0, 0, 0, 0.5);
    }

    .recent-card-icon {
      font-size: 2rem;
      margin-bottom: 16px;
    }

    .recent-card-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #ffecbb;
      margin-bottom: 8px;
    }

    .recent-card-desc {
      font-size: 0.95rem;
      opacity: 0.8;
      line-height: 1.5;
    }

    /* 精简Hero区适配 */
    .hero {
      text-align: center;
      padding: 40px 0 20px;
    }
  </style>
</head>
<body>
  <!-- 顶部玻璃导航（完整保留） -->
  <header class="navbar">
    <div class="nav-container">
      <div class="nav-logo">⚡ CF Site</div>
      <nav class="nav-links">
        <a href="/index.html" class="active">首页</a>
        <a href="/about.html">关于</a>
        <a href="/links.html">链接收藏</a>
        <a href="/api/hello">API 测试</a>
        <a href="/gallery.html">图库</a>
      </nav>
    </div>
  </header>

  <!-- 主容器 -->
  <main class="main-wrap">
    <!-- 精简英雄区：仅保留功能跳转按钮，移除所有宣传文案 -->
    <section class="hero">
      <div class="hero-buttons">
        <a href="/links.html" class="btn btn-primary">🔖 链接收藏舱</a>
        <a href="/gallery.html" class="btn btn-outline">🖼️ 图片图库</a>
        <a href="/about.html" class="btn btn-outline">关于站点</a>
      </div>
    </section>

    <!-- 新增：最近使用区域 -->
    <section class="recent-section">
      <h2 class="section-title">最近使用</h2>
      <p class="section-desc">✦ 快速访问常用功能 ✦</p>
      
      <div class="recent-grid">
        <a href="/links.html" class="recent-card">
          <div class="recent-card-icon">🔖</div>
          <div class="recent-card-title">链接收藏舱</div>
          <div class="recent-card-desc">管理与快速访问你收藏的优质链接</div>
        </a>

        <a href="/gallery.html" class="recent-card">
          <div class="recent-card-icon">🖼️</div>
          <div class="recent-card-title">图片图库</div>
          <div class="recent-card-desc">浏览你收藏的精选图片合集</div>
        </a>
      </div>
    </section>
  </main>

  <!-- 页脚（完整保留） -->
  <footer class="footer">
    <p>© 2025 My Cloudflare Site · Built with Vite & Cloudflare Pages</p>
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
