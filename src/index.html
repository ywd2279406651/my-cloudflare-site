<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloudflare Vite 静态站点</title>
  <meta name="description" content="基于 Vite 构建 + Cloudflare Pages 托管的无服务器站点方案">
  <link rel="stylesheet" href="./assets/styles/main.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    /* 新增：最近在做 区域样式，玻璃拟态风格与全站统一 */
    .recent-projects {
      margin-top: 60px;
    }

    .recent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      margin-top: 30px;
    }

    .recent-card {
      background: rgba(20, 28, 50, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
    }

    .recent-card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 215, 100, 0.35);
      box-shadow: 0 28px 45px -15px rgba(0, 0, 0, 0.6);
    }

    .recent-card h3 {
      font-size: 1.25rem;
      color: #ffecbb;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .recent-card p {
      color: rgba(240, 240, 240, 0.8);
      line-height: 1.6;
      font-size: 0.95rem;
      margin-bottom: 18px;
    }

    .recent-card .card-tag {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(255, 236, 187, 0.15);
      border-radius: 20px;
      font-size: 0.8rem;
      color: #ffecbb;
    }

    /* 简化英雄区样式适配 */
    .hero {
      text-align: center;
      padding: 40px 0 20px;
    }
  </style>
</head>
<body>
  <!-- 顶部玻璃导航（完整保留） -->
  <header class="navbar">
    <div class="nav-container">
      <div class="nav-logo">⚡ CF Site</div>
      <nav class="nav-links">
        <a href="/index.html" class="active">首页</a>
        <a href="/about.html">关于</a>
        <a href="/links.html">链接收藏</a>
        <a href="/api/hello">API 测试</a>
        <a href="/gallery.html">图库</a>
      </nav>
    </div>
  </header>

  <!-- 主容器 -->
  <main class="main-wrap">
    <!-- 简化英雄区：移除宣传文案，保留核心功能入口 -->
    <section class="hero">
      <span class="hero-badge">✨ 个人导航站</span>
      <h1>欢迎来到我的站点</h1>
      <div class="hero-buttons">
        <a href="/gallery.html" class="btn btn-primary">🖼️ 进入图库</a>
        <a href="/links.html" class="btn btn-outline">🔖 链接收藏</a>
        <a href="/about.html" class="btn btn-outline">关于本站</a>
      </div>
    </section>

    <!-- 新增：最近在做 区域（双玻璃拟态卡片） -->
    <section class="recent-projects">
      <h2 class="section-title">最近在做</h2>
      <p class="section-desc">✦ 记录当前项目与动态 ✦</p>
      
      <div class="recent-grid">
        <!-- 卡片1：可自行修改标题、描述、标签 -->
        <div class="recent-card">
          <h3>📸 个人图库搭建</h3>
          <p>基于 Vite + Cloudflare Pages 搭建个人图片收藏库，响应式网格布局，全球 CDN 加速访问。</p>
          <span class="card-tag">进行中</span>
        </div>
        <!-- 卡片2：可自行修改标题、描述、标签 -->
        <div class="recent-card">
          <h3>🔗 优质链接整理</h3>
          <p>持续收集开发工具、设计资源与实用网站，分类归档，打造个人专属导航书签库。</p>
          <span class="card-tag">长期更新</span>
        </div>
      </div>
    </section>
  </main>

  <!-- 页脚（完整保留） -->
  <footer class="footer">
    <p>© 2025 My Cloudflare Site · Built with Vite & Cloudflare Pages</p>
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
