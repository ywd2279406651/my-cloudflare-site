<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片图库</title>
  <link rel="stylesheet" href="./assets/styles/main.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      --bg-mask: rgba(15, 18, 35, 0.38);
      --card-bg: rgba(32, 36, 58, 0.38);
      --card-border: rgba(255, 255, 255, 0.10);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.78);
      --text-muted: rgba(255, 255, 255, 0.58);
      --accent-color: #7c3aed;
      --item-hover-bg: rgba(255, 255, 255, 0.08);
      --stat-bg: rgba(255, 255, 255, 0.06);
      --title-color: #f5e6b3;
      --divider-color: rgba(245, 230, 179, 0.25);
      --nav-text: #ffffff;
    }
    .light-theme {
      --bg-mask: rgba(240, 245, 255, 0.35);
      --card-bg: rgba(255, 255, 255, 0.62);
      --card-border: rgba(0, 0, 0, 0.06);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --accent-color: #6d28d9;
      --item-hover-bg: rgba(109, 40, 217, 0.08);
      --stat-bg: rgba(255, 255, 255, 0.55);
      --title-color: #6d28d9;
      --divider-color: rgba(109, 40, 217, 0.2);
      --nav-text: #1e293b;
    }
    html, body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      color: var(--text-primary);
    }
    body {
      background: url('https://picsum.photos/id/1043/1920/1080') center/cover no-repeat fixed;
      position: relative;
    }
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--bg-mask);
      z-index: -1;
    }
    .navbar {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--card-border);
    }
    .light-theme .nav-logo, .light-theme .nav-links a {color: var(--nav-text);}
    .light-theme .nav-links a.active {color: var(--accent-color);}
    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      width:36px;height:36px;border-radius:10px;cursor:pointer;
    }
    .main-wrap {max-width:1280px;margin:0 auto;padding:30px 20px;}
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border:1px solid var(--card-border);
      border-radius:18px;padding:28px;box-shadow:var(--card-shadow);
    }
    .page-title {font-size:2.2rem;text-align:center;color:var(--title-color);margin-bottom:10px;}
    .page-desc {text-align:center;color:var(--text-secondary);margin-bottom:36px;padding-bottom:20px;border-bottom:1px dashed var(--divider-color);}
    .gallery-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-bottom:36px;}
    .gallery-item {border-radius:16px;overflow:hidden;background:var(--stat-bg);border:1px solid var(--card-border);}
    .gallery-item img {width:100%;height:180px;object-fit:cover;display:block;}
    .gallery-caption {padding:14px;text-align:center;color:var(--title-color);}
    .back-btn {display:block;margin:0 auto;padding:12px 30px;background:var(--stat-bg);border:1px solid var(--card-border);border-radius:12px;text-decoration:none;color:var(--text-primary);text-align:center;}
  </style>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="./assets/zhuyetu/LOOP.mp4">
  </video>
  <header class="navbar">
    <div class="nav-container">
      <div class="nav-logo">⚡ CF Site</div>
      <nav class="nav-links">
        <a href="/index.html">首页</a>
        <a href="/about.html">关于</a>
        <a href="/links.html">链接收藏</a>
        <a href="/gallery.html" class="active">图库</a>
        <a href="/subscribe.html">订阅工具</a>
        <a href="/api/hello">API 测试</a>
      </nav>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
  </header>
  <main class="main-wrap">
    <div class="glass-card">
      <h1 class="page-title">🖼️ 图片收藏库</h1>
      <div class="page-desc">精选图片合集</div>
      <div class="gallery-grid">
        <div class="gallery-item"><img src="./assets/images/photo1.jpg"><div class="gallery-caption">图集1</div></div>
        <div class="gallery-item"><img src="./assets/images/photo2.jpg"><div class="gallery-caption">图集2</div></div>
        <div class="gallery-item"><img src="./assets/images/photo3.jpg"><div class="gallery-caption">图集3</div></div>
        <div class="gallery-item"><img src="./assets/images/photo4.jpg"><div class="gallery-caption">图集4</div></div>
        <div class="gallery-item"><img src="./assets/images/photo5.jpg"><div class="gallery-caption">图集5</div></div>
        <div class="gallery-item"><img src="./assets/images/photo6.jpg"><div class="gallery-caption">图集6</div></div>
      </div>
      <a href="/index.html" class="back-btn">← 返回首页</a>
    </div>
  </main>
  <footer class="footer"><p>© 2025 My Cloudflare Site</p></footer>
  <script>
    document.querySelectorAll('.gallery-item img').forEach(img=>{
      img.onclick=()=>window.open(img.src,'_blank');
    })
    const themeToggle = document.getElementById('themeToggle');
    const htmlEl = document.documentElement;
    if(localStorage.getItem('site-theme')==='light'){
      htmlEl.classList.add('light-theme');themeToggle.textContent='☀️';
    }
    themeToggle.onclick=()=>{
      htmlEl.classList.toggle('light-theme');
      const isLight = htmlEl.classList.contains('light-theme');
      themeToggle.textContent = isLight ? '☀️' : '🌙';
      localStorage.setItem('site-theme', isLight ? 'light' : 'dark');
    }
    (function(){
      const verKey = "site_build_version";
      const buildVer = Date.now();
      const localVer = localStorage.getItem(verKey);
      if(localVer && Math.abs(buildVer - localVer) > 86400000){
        localStorage.setItem(verKey, buildVer);
        window.location.reload(true);
      }else{
        localStorage.setItem(verKey, buildVer);
      }
    })()
  </script>
</body>
</html>
