<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>链接收藏舱</title>
  <link rel="stylesheet" href="./assets/styles/main.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      --bg-mask: rgba(15, 18, 35, 0.38);
      --card-bg: rgba(32, 36, 58, 0.38);
      --card-border: rgba(255, 255, 255, 0.10);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.78);
      --text-muted: rgba(255, 255, 255, 0.58);
      --accent-color: #7c3aed;
      --item-hover-bg: rgba(255, 255, 255, 0.08);
      --stat-bg: rgba(255, 255, 255, 0.06);
      --title-color: #f5e6b3;
      --divider-color: rgba(245, 230, 179, 0.25);
      --nav-text: #ffffff;
      /* 下拉框主题变量 */
      --select-bg: #22263b;
      --select-text: #fff;
      --select-hover: #4338ca;
    }
    .light-theme {
      --bg-mask: rgba(240, 245, 255, 0.35);
      --card-bg: rgba(255, 255, 255, 0.62);
      --card-border: rgba(0, 0, 0, 0.06);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --accent-color: #6d28d9;
      --item-hover-bg: rgba(109, 40, 217, 0.08);
      --stat-bg: rgba(255, 255, 255, 0.55);
      --title-color: #6d28d9;
      --divider-color: rgba(109, 40, 217, 0.2);
      --nav-text: #1e293b;
      /* 亮色下拉变量 */
      --select-bg: #ffffff;
      --select-text: #1e293b;
      --select-hover: #ddd6fe;
    }
    html, body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      color: var(--text-primary);
      transition: color 0.3s ease;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: url('https://picsum.photos/id/1043/1920/1080') center/cover no-repeat fixed;
      position: relative;
    }
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      pointer-events: none;
      filter: blur(0px) saturate(1.2);
      transform: scale(1.02);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--bg-mask);
      z-index: -1;
      transition: background 0.3s ease;
    }
    .navbar {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--card-border);
    }
    .light-theme .nav-logo, .light-theme .nav-links a {color: var(--nav-text);}
    .light-theme .nav-links a.active {color: var(--accent-color);}
    .theme-toggle {
      background: var(--card-bg) !important;
      border: 1px solid var(--card-border) !important;
      color: var(--text-primary) !important;
      width:36px;height:36px;border-radius:10px;cursor:pointer;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      font-size: 1rem !important;
      transition: all 0.3s ease !important;
      margin-left: 16px !important;
      padding: 0 !important;
    }
    .theme-toggle:hover {
      transform: scale(1.08);
      border-color: var(--accent-color) !important;
    }
    .main-wrap {max-width:1280px;margin:0 auto;padding:30px 20px;}
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border:1px solid var(--card-border);
      border-radius:18px;padding:28px;box-shadow:var(--card-shadow);
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .page-title {font-size:2.2rem;text-align:center;color:var(--title-color);margin-bottom:10px;letter-spacing:1px;}
    .page-desc {text-align:center;color:var(--text-secondary);margin-bottom:36px;padding-bottom:20px;border-bottom:1px dashed var(--divider-color);}
    .card-collection {display:flex;flex-wrap:wrap;gap:24px;justify-content:center;margin-bottom:30px;}
    .link-card {flex:1 1 320px;background:var(--stat-bg);border-radius:16px;padding:28px;border:1px solid var(--card-border);transition: 0.3s;}
    .link-card:hover {transform: translateY(-4px);border-color: var(--accent-color);}
    .card-header {display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--divider-color);}
    .card-name {font-size:1.3rem;color:var(--title-color);font-weight:600;}
    /* 修复下拉选择框样式 */
    .link-select {
      width:100%;
      padding:14px 18px;
      border-radius:12px;
      background: var(--select-bg);
      border:1px solid var(--card-border);
      color: var(--select-text);
      margin-bottom:16px;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }
    .link-select:focus {
      border-color: var(--accent-color);
    }
    /* 下拉选项样式适配主题 */
    .link-select option {
      background: var(--select-bg);
      color: var(--select-text);
      padding: 10px;
    }
    .link-select option:hover,
    .link-select option:checked {
      background: var(--select-hover);
    }
    .open-btn {width:100%;padding:13px;border-radius:12px;background:var(--accent-color);color:#fff;border:none;font-weight:600;cursor:pointer;transition:0.2s;}
    .open-btn:hover {filter: brightness(1.15);transform: translateY(-2px);}
    .back-btn {display:block;margin:0 auto;padding:12px 30px;background:var(--stat-bg);border:1px solid var(--card-border);border-radius:12px;text-decoration:none;color:var(--text-primary);text-align:center;transition:0.2s;}
    .back-btn:hover {background: var(--item-hover-bg);border-color: var(--accent-color);transform: translateY(-2px);}
  </style>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="./assets/zhuyetu/LOOP.mp4">
  </video>
  <header class="navbar">
    <div class="nav-container" style="display:flex;align-items:center;gap:16px;">
      <div class="nav-logo">⚡ CF Site</div>
      <nav class="nav-links" style="display:flex;gap:24px;">
        <a href="/index.html">首页</a>
        <a href="/about.html">关于</a>
        <a href="/links.html" class="active">链接收藏</a>
        <a href="/gallery.html">图库</a>
        <a href="/subscribe.html">订阅工具</a>
        <a href="/api/hello">API 测试</a>
      </nav>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
  </header>
  <main class="main-wrap">
    <div class="glass-card">
      <h1 class="page-title">🔖 链接收藏舱</h1>
      <div class="page-desc">常用网址一键跳转</div>
      <div class="card-collection">
        <div class="link-card">
          <div class="card-header"><span>📁</span><div class="card-name">工作工具集</div></div>
          <select class="link-select" id="workSel">
            <option value="https://google.com">Google搜索</option>
            <option value="https://github.com">Github</option>
            <option value="https://stackoverflow.com">Stackoverflow</option>
            <option value="https://developer.mozilla.org">MDN文档</option>
            <option value="https://figma.com">Figma</option>
          </select>
          <button class="open-btn" onclick="goOpen('workSel')">打开网址</button>
        </div>
        <div class="link-card">
          <div class="card-header"><span>📚</span><div class="card-name">生活合集</div></div>
          <select class="link-select" id="lifeSel">
            <option value="https://bilibili.com">B站</option>
            <option value="https://zhihu.com">知乎</option>
            <option value="https://youtube.com">YouTube</option>
            <option value="https://spotify.com">Spotify</option>
          </select>
          <button class="open-btn" onclick="goOpen('lifeSel')">打开网址</button>
        </div>
      </div>
      <a href="/index.html" class="back-btn">← 返回首页</a>
    </div>
  </main>
  <footer class="footer" style="text-align:center;padding:20px;color:var(--text-muted);">
    <p>© 2025 My Cloudflare Site</p>
  </footer>
  <script>
    function goOpen(id){
      const val = document.getElementById(id).value;
      window.open(val,'_blank');
    }
    const themeToggle = document.getElementById('themeToggle');
    const htmlEl = document.documentElement;
    if(localStorage.getItem('site-theme')==='light'){
      htmlEl.classList.add('light-theme');themeToggle.textContent='☀️';
    }
    themeToggle.onclick=()=>{
      htmlEl.classList.toggle('light-theme');
      const isLight = htmlEl.classList.contains('light-theme');
      themeToggle.textContent = isLight ? '☀️' : '🌙';
      localStorage.setItem('site-theme', isLight ? 'light' : 'dark');
    }
    (function(){
      const verKey = "site_build_version";
      const buildVer = Date.now();
      const localVer = localStorage.getItem(verKey);
      if(localVer && Math.abs(buildVer - localVer) > 86400000){
        localStorage.setItem(verKey, buildVer);
        window.location.reload(true);
      }else{
        localStorage.setItem(verKey, buildVer);
      }
    })()
  </script>
</body>
</html>
